# =============================================================================
# TensorCash Default Configuration for Desktop Wallets
# =============================================================================
#
# This file is bundled with desktop releases and copied to the user's data
# directory on first run if no configuration exists.
#
# Users can modify this file at:
#   macOS:   ~/Library/Application Support/TensorCash/bitcoin.conf
#   Windows: %APPDATA%\TensorCash\bitcoin.conf
#   Linux:   ~/.tensorcash/bitcoin.conf
#
# =============================================================================

# -----------------------------------------------------------------------------
# Core Settings
# -----------------------------------------------------------------------------

# Chain selection defaults to the build's compile-time chain type.
# Separate mainnet and testnet installers set this automatically.

# Use the bundled cosign bridge by default (relative to app executable)
cosignbridge=@executable_path/cosign-bridge

# Enable the RPC server (required for GUI wallet functionality)
server=1

# Don't run as a daemon (GUI manages the process)
daemon=0

# Transaction index (incompatible with prune mode, disabled by default)
# txindex=1

# Listen for incoming P2P connections
listen=1

# Accept connections from localhost only for RPC.
# NOTE: rpcbind is a NETWORK_ONLY arg in bcore — it must live in a [chain]
# section, not the global section, or the mainnet (tensor) build aborts on
# first run: "Config setting for -rpcbind only applied on tensor network when
# in [tensor] section." Declared per-chain in the sections below. rpcallowip
# is NOT network-only and can stay global.
rpcallowip=127.0.0.1

# Disable external mining bridge by default for desktop wallets
useextapi=0

# -----------------------------------------------------------------------------
# Network Limits
# -----------------------------------------------------------------------------

# Maximum number of peer connections
maxconnections=32

# Target daily upload limit (MB) - conservative for home users
# Set to 0 for unlimited
maxuploadtarget=1000

# -----------------------------------------------------------------------------
# Validation API (Remote Proof Validation)
# -----------------------------------------------------------------------------

# Desktop default: local quick verification + HTTPS full/model via gateway
# Options: real | mock | desktop
validationapi=desktop

# Gateway verification service (HTTPS)
# Override via environment:
#   VALIDATOR_HTTP_URL, VALIDATOR_API_KEY
# Example:
# validatorhttpurl=https://verify.tensorcash.io
# validatorapikey=YOUR_API_KEY

# If you want to force the legacy ZMQ validator path instead:
# validationapi=real
# validatorhost=validator.tensorcash.io
# validatorpushport=6001
# validatorpullport=7001

# -----------------------------------------------------------------------------
# Tor / Onion Connectivity
# -----------------------------------------------------------------------------

# Route all P2P connections through the bundled Tor SOCKS proxy.
# TorManager starts Tor automatically on port 9150.
proxy=127.0.0.1:9150

# Create and advertise a Tor onion service for inbound connections
listenonion=1

# Control port for automatic onion service creation
torcontrol=127.0.0.1:9151

# -----------------------------------------------------------------------------
# Wallet Settings
# -----------------------------------------------------------------------------

# Enable wallet functionality
# disablewallet=0

# Default fee rate (sat/vB) when fee estimation unavailable
fallbackfee=0.00001

# Spend unconfirmed change outputs
spendzeroconfchange=1

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------

# Keep debug log file small (MB)
shrinkdebugfile=1

# Log categories (uncomment for debugging)
# debug=validation
# debug=zmq
# debug=net

# -----------------------------------------------------------------------------
# GUI Settings
# -----------------------------------------------------------------------------

# Minimize to system tray instead of closing
# mintotray=1

# Start minimized
# startminimized=0

# =============================================================================
# Chain-Specific Overrides
# =============================================================================

# Mainnet settings (active when running with chain=tensor).
# REQUIRED: without a [tensor] section the global rpcbind (NETWORK_ONLY) makes
# the mainnet build abort on first launch.
[tensor]
validationapi=desktop
server=1
listen=1
rpcbind=127.0.0.1
rpcallowip=127.0.0.1
# RPC on P2P-1 (39240), NOT the chainparamsbase default 39242 — bcore binds an
# aux listener at P2P+1 (39242), so leaving RPC on 39242 collides and the node
# aborts with "Unable to bind to 127.0.0.1:39242 … already running". Mirrors
# the [tensor-test] 29240/29241 relationship.
rpcport=39240
useextapi=0

# Mainnet seed: the dual-chain tor-seeder's onion (same box as the testnet
# seeder, hidden service now also maps :39241). It harvests mainnet node onions
# from its addrman and gossips them, so the wallet discovers peers and syncs —
# identical mechanism to the [tensor-test] seednode below.
seednode=tf3uzbkgaqcqczbimg7qoeg63ui4i4jneaszacyazrimjtk3yccx7oad.onion:39241

# Testnet settings (active when running with chain=tensor-test)
[tensor-test]
validationapi=desktop
server=1
listen=1
rpcbind=127.0.0.1
rpcallowip=127.0.0.1
useextapi=0

# Bootstrap peers (onion-only testnet — seednode connects, gets addrs, disconnects)
seednode=tf3uzbkgaqcqczbimg7qoeg63ui4i4jneaszacyazrimjtk3yccx7oad.onion:29241
seednode=tenflqjbcmi2vergliemsb4b3lryzbtkn5wkg7n6qrpsknqgmjknm2qd.onion:29241

# Onion diversity for ASN corroboration (must match simplenode config)
spv-onion-prefix=ten
spv-onion-tag-len=3

# Regtest settings (active when running with chain=tensor-reg)
[tensor-reg]
validationapi=mock
