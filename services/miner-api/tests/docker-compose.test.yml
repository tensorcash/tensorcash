version: '3.3'

services:
  # Mock Core Node API for model sync
  mock-core-node:
    image: python:3.10-slim
    container_name: mock-core-node
    working_dir: /app
    volumes:
      - ./mock_core_node.py:/app/server.py
    command: >
      sh -c "pip install aiohttp &&
             python server.py"
    ports:
      - "8050:8050"
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8050/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Mock VLLM server for testing
  mock-vllm:
    image: python:3.10-slim
    container_name: mock-vllm
    working_dir: /app
    volumes:
      - ./mock_vllm_server.py:/app/server.py
    command: >
      sh -c "pip install aiohttp &&
             python server.py"
    ports:
      - "8000:8000"
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/status')"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Mining proxy under test
  mining-proxy:
    build:
      context: ../../..
      dockerfile: services/miner-api/proxy.Dockerfile
    container_name: mining-proxy-test
    command: >
      sh -c "echo 'Waiting for services to be ready...' &&
             until python -c 'import socket; s=socket.socket(); s.settimeout(1); s.connect((\"mock-vllm\", 8000)); s.close()' 2>/dev/null; do
               echo 'Waiting for mock-vllm...';
               sleep 2;
             done &&
             until python -c 'import socket; s=socket.socket(); s.settimeout(1); s.connect((\"mock-core-node\", 8050)); s.close()' 2>/dev/null; do
               echo 'Waiting for mock-core-node...';
               sleep 2;
             done &&
             echo 'All services ready, starting proxy...' &&
             python main.py"
    environment:
      - TARGET_URL=http://mock-vllm:8000/v1/completions
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=8081
      - ZMQ_PULL_PORT=6000
      - MIN_ACTIVE_REQUESTS=0
      - DUMMY_REQUEST_TIMEOUT=10
      - LOG_LEVEL=DEBUG
      - TEST_MODE=true
      # Self-seed a genesis block so the VDF prover actually runs. Without this
      # the proxy waits for a real mining job on ZMQ :6000, which only exists
      # when the runner host is a live miner (the self-hosted case) — on clean
      # CI runners no job ever arrives, the block stays all-zero, the VDF is
      # skipped (see vdf_service.py: all-zero hash => skip unless GENESIS), and
      # every completion 500s with "VDF proof not yet available". Genesis mode
      # makes the test hermetic.
      - GENESIS_GENERATOR=True
      # The e2e asserts pow rides in `extra_sampling_params` (the older vLLM /
      # llama.cpp field). Default is USE_VLLM_XARGS = not LLAMA_CPP = True, which
      # injects into `vllm_xargs` instead and fails the assertion. Pin the field
      # the test expects.
      - USE_VLLM_XARGS=false
      - MODEL_API_URL=http://mock-core-node:8050
      - PROOF_CACHE_ENABLED=true
      - BATCH_SIZE=5
    ports:
      - "8081:8081"
      - "6000:6000"
      - "7002:7002"
    depends_on:
      - mock-vllm
      - mock-core-node
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ZMQ job sender for testing (disabled - file missing)
  # zmq-sender:
