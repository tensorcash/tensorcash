  #   container_name: e2e-test-runner
  #   working_dir: /app
  #   volumes:
  #     - ./e2e_tests.py:/app/tests.py
  #     - ./test_results:/app/results
  #   environment:
  #     - PROXY_URL=http://mining-proxy:8081
  #     - MOCK_VLLM_URL=http://mock-vllm:8000
  #     - ZMQ_PUSH_HOST=mining-proxy
  #     - ZMQ_PUSH_PORT=6000
