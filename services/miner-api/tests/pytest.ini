[tool:pytest]
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, with mocked services)
    protocol: Protocol compliance tests
    completion_id: Completion ID integrity tests (CRITICAL)
    error_handling: Error handling and resilience tests
    slow: Slow tests (timeouts, long operations)
    broker: Broker integration tests
    e2e: End-to-end tests

testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
timeout = 30