[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:llama-server]
command=/app/start-llama.sh
directory=/app
autostart=true
autorestart=true
startretries=3
startsecs=30
redirect_stderr=true
stdout_logfile=/var/log/supervisor/llama-server.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
priority=10
user=worker
environment=HOME="/home/worker",USER="worker"

[program:miner-proxy]
command=/app/start-proxy.sh
directory=/app/miner-proxy/src
autostart=true
autorestart=true
startretries=3
startsecs=10
redirect_stderr=true
stdout_logfile=/var/log/supervisor/miner-proxy.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
priority=20
user=worker
environment=HOME="/home/worker",USER="worker"
