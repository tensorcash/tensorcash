[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:vllm]
command=/app/start-vllm.sh
directory=/app
autostart=true
autorestart=true
startretries=3
startsecs=30
redirect_stderr=true
# Route to container stdout (visible in RunPod/docker logs) — the
# vllm.log file was invisible in RunPod's log view, blinding us to
# startup crashes. maxbytes=0 is required for the /dev/fd/1 sink.
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
priority=10
user=worker
environment=HOME="/home/worker",USER="worker"

[program:miner-proxy]
command=/app/start-proxy.sh
directory=/app/miner-proxy/src
autostart=true
autorestart=true
startretries=3
startsecs=10
redirect_stderr=true
stdout_logfile=/var/log/supervisor/miner-proxy.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
priority=20
user=worker
environment=HOME="/home/worker",USER="worker"
# Note: start-proxy.sh waits for vLLM health check before starting miner-proxy

# ---------------------------------------------------------------------------
# Optional mining vLLM (MINING_VLLM_ENABLED=true): a second vLLM instance
# holding the chain-registered mining model on the same GPU. The SINGLE
# miner-proxy above fronts both backends (MODEL_ROUTES): mining-model
# requests get real PoW injection, all other models get audit_emit
# injection; both instances push proofs to the one ProofCollector. The
# script exits 0 immediately when disabled — autorestart=unexpected +
# exitcodes=0 + startsecs=0 keeps supervisord from flapping the disabled
# program while still restarting real crashes.
# ---------------------------------------------------------------------------
[program:vllm-mining]
command=/app/start-vllm-mining.sh
directory=/app
autostart=true
autorestart=unexpected
exitcodes=0
startsecs=0
redirect_stderr=true
stdout_logfile=/var/log/supervisor/vllm-mining.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
priority=15
user=worker
environment=HOME="/home/worker",USER="worker"
# Waits for the primary vLLM's /health before allocating VRAM so the two
# instances never race GPU memory profiling.
