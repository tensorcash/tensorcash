# Simple Worker: Single container deployment for TensorCash compute provider
# Runs vLLM + miner-proxy in broker mode
#
# Usage:
#   1. Copy .env.example to .env and configure your broker credentials
#   2. docker compose up -d
#
# Note: This connects OUTBOUND to broker via WSS. No inbound ports needed.

services:
  simple-worker:
    image: ghcr.io/tensorcash/simple-worker:latest
    # Or build locally:
    # build:
    #   context: ../..
    #   dockerfile: deployments/simple-worker/Dockerfile

    # GPU access via NVIDIA Container Toolkit
    # Option 1: docker compose v2.x+ with Compose Spec (swarm-compatible)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Option 2: docker compose v2.x non-swarm (uncomment if GPUs not visible)
    # device_requests:
    #   - driver: nvidia
    #     count: all
    #     capabilities: [gpu]

    environment:
      # === REQUIRED: Broker Connection ===
      BROKER_WS_URL: ${BROKER_WS_URL:?Set BROKER_WS_URL in .env}
      PROVIDER_JWT_TOKEN: ${PROVIDER_JWT_TOKEN:?Set PROVIDER_JWT_TOKEN in .env}

      # === Model Configuration ===
      MODEL_NAME: ${MODEL_NAME:-Qwen/Qwen3-8B}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-8192}
      GPU_MEM_UTIL: ${GPU_MEM_UTIL:-0.9}

      # === Worker Capabilities (advertised to broker) ===
      WORKER_CAPACITY: ${WORKER_CAPACITY:-4}
      COMPUTE_TYPE: ${COMPUTE_TYPE:-nvidia-8.9}
      GPU_MODEL: ${GPU_MODEL:-RTX-4090}
      GPU_MEMORY_GB: ${GPU_MEMORY_GB:-24}
      WORKER_REGION: ${WORKER_REGION:-us-west-2}
      # Context/output limits (required by broker for scheduling)
      MAX_CONTEXT_WINDOW: ${MAX_CONTEXT_WINDOW:-128000}
      MAX_OUTPUT_TOKENS: ${MAX_OUTPUT_TOKENS:-8192}

      # === Internal (usually no need to change) ===
      WORKER_MODE: broker
      STANDALONE_MODE: "true"
      TARGET_URL: http://127.0.0.1:8000
      API_KEY: internal-secret
      MINING_ENABLED: "true"
      # Emitted proof version. Mainnet activated v3 (h8000); v2 proofs are
      # rejected post-activation (bad-proof-version-v3) while dashboards still
      # look healthy, so this MUST be 3 to win a mainnet block. Override to 2
      # only for a pre-v3 testnet.
      POW_PROOF_VERSION: ${POW_PROOF_VERSION:-3}
      PROOF_CACHE_ENABLED: "true"

    volumes:
      # Persist downloaded models
      - models-cache:/models
      # Optional: logs
      - ./logs:/var/log/supervisor

    # No ports needed - broker mode is outbound-only
    # Uncomment for debugging:
    # ports:
    #   - "8080:8080"  # miner-proxy status endpoint

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  models-cache:
