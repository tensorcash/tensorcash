name: Build Simple Worker

on:
  workflow_dispatch:
    inputs:
      cuda_version:
        description: 'CUDA version'
        required: false
        default: '12.8.0'
      vllm_version:
        description: 'vLLM version'
        required: false
        default: '0.10.0'
  push:
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/simple-worker
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: [self-hosted, linux, x64, docker]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Initialize submodules
        run: |
          git submodule init
          for sub in $(git config --file .gitmodules --get-regexp path | awk '{print $2}'); do
            echo "Updating: $sub"
            git submodule update --init --recursive "$sub" || echo "Warning: $sub failed"
          done
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          name: shared-builder
          cleanup: false
      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=cuda${{ inputs.cuda_version || '12.8.0' }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          builder: shared-builder
          context: .
          file: deployments/simple-worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CUDA_VERSION=${{ inputs.cuda_version || '12.8.0' }}
            VLLM_VERSION=${{ inputs.vllm_version || '0.10.0' }}
          cache-from: "type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache"
          cache-to: "type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max"
          platforms: linux/amd64
      - name: Print image digest
        run: echo "${{ steps.build.outputs.digest }}"
